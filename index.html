<!-- Header -->
<header class="sticky top-0 w-full z-50 bg-[#fcf9f1]/80 backdrop-blur-xl">

            <span class="material-symbols-outlined text-primary text-2xl sm:text-3xl">park</span>

        </div>

    </div>
</header>

<main class="max-w-screen-xl mx-auto px-4 sm:px-6">

<!-- ═══ MAP SECTION ═══ -->
<div id="section-map" class="section active">

    <!-- Filter Pills -->
    <section class="py-3 sm:py-4 overflow-x-auto hide-scrollbar -mx-4 sm:-mx-6 px-4 sm:px-6">
        <div class="flex gap-2 min-w-max" id="filter-bar"></div>
    </section>

    <!-- Map -->
    <div class="rounded-2xl sm:rounded-3xl overflow-hidden shadow-[0px_12px_32px_rgba(28,28,23,0.06)] mb-6 sm:mb-8">
        <div id="leaflet-map" class="w-full h-[240px] sm:h-[320px] lg:h-[400px]"></div>
    </div>

    <!-- Cards rendered by JS -->
    <div id="cards-root"></div>
</div>

<!-- ═══ TRIPS SECTION ═══ -->
<div id="section-trips" class="section">
    <div class="py-8 text-center">
        <span class="material-symbols-outlined text-5xl text-outline-variant/30 mb-4">explore</span>
        <h2 class="text-xl font-extrabold text-primary mb-2" data-i18n="trips.title"></h2>
        <p class="text-sm text-on-surface-variant" data-i18n="trips.subtitle"></p>
    </div>
</div>

<!-- ═══ PLANNER SECTION ═══ -->
<div id="section-planner" class="section">
    <h2 class="text-xl sm:text-2xl font-extrabold text-primary mt-6 mb-5 flex items-center gap-3">
        <span data-i18n="planner.timeline"></span>
        <span class="h-px flex-1 bg-outline-variant/20"></span>
    </h2>
    <div id="planner-days"></div>
    <p class="text-[10px] text-on-surface-variant mt-4 opacity-50 text-center">Open-Meteo API · Velké Hamry</p>
</div>

<!-- ═══ TIPS SECTION ═══ -->
<div id="section-tips" class="section">
    <div class="mt-6 mb-6" id="tips-root"></div>
</div>

</main>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 w-full z-50 bg-[#fcf9f1]/90 backdrop-blur-2xl shadow-[0px_-12px_32px_rgba(28,28,23,0.06)] rounded-t-2xl border-t border-[#c3c8c0]/15">

function renderDetailRow(icon, label, value) {
    if (!value) return '';
    return `<div class="flex items-start gap-2.5">

        <div><p class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-0.5">${label}</p>
        <p class="text-xs leading-relaxed text-on-surface">${value}</p></div>
    </div>`;
}

// ═══════════════════════════════════════════════════
// USER DATA (localStorage)
// ═══════════════════════════════════════════════════
function getUserData() {
    try { return JSON.parse(localStorage.getItem('vh-planner') || '{}'); } catch { return {}; }
}
function saveUserData(data) { localStorage.setItem('vh-planner', JSON.stringify(data)); }
function ensureUserData() { const d = getUserData(); if (!d.ratings) d.ratings = {}; if (!d.days) d.days = {}; saveUserData(d); return d; }
ensureUserData();

function setRating(cardId, value) {
    const d = ensureUserData();
    // Toggle: tap same value again to clear
    d.ratings[cardId] = d.ratings[cardId] === value ? 0 : value;
    saveUserData(d);
    renderCards(); // re-render to re-sort
    renderPlanner();
}

function assignDay(cardId, day) {
    const d = ensureUserData();
    if (day) d.days[cardId] = day; else delete d.days[cardId];
    saveUserData(d);
    renderPlanner();
}

function toggleDetails(id) {
    const section = document.getElementById('details-' + id);
    const btn = document.getElementById('toggle-' + id);
    const isOpen = section.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
    btn.querySelector('.label').textContent = isOpen ? t('btn.less') : t('btn.more');
}

function renderCards() {
    const ud = ensureUserData();
    const sortByRating = (a, b) => (ud.ratings[b.id] || 0) - (ud.ratings[a.id] || 0);
    const cats = { recommended: [], indoor: [], daytrips: [], unique: [], relax: [] };
    CARDS.forEach(c => cats[c.category].push(c));
    Object.values(cats).forEach(arr => arr.sort(sortByRating));
    let html = '';
    for (const [cat, cards] of Object.entries(cats)) {
        html += `<h2 class="text-xl sm:text-2xl font-extrabold text-primary ${cat !== 'recommended' ? 'mt-8' : ''} mb-4 sm:mb-6 flex items-center gap-3">
            ${t('cat.' + cat)}<span class="h-px flex-1 bg-outline-variant/20"></span></h2>`;
        html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-5 sm:gap-6">${cards.map(renderCard).join('')}</div>`;
    }
    document.getElementById('cards-root').innerHTML = html;
}

function renderPlanner() {
    const dayKeys = ['thu', 'fri', 'sat', 'sun', 'mon'];
    const dayCodes = { thu: 'THU', fri: 'FRI', sat: 'SAT', sun: 'SUN', mon: 'MON' };
    const ud = ensureUserData();
    const cardsByDay = {};
    dayKeys.forEach(k => cardsByDay[k] = []);

    Object.entries(ud.days || {}).forEach(([cardId, day]) => {
        const card = CARDS.find(c => c.id === parseInt(cardId));
        if (card && cardsByDay[day]) cardsByDay[day].push(card);
    });

    let html = dayKeys.map(day => {
        const cards = cardsByDay[day];
        const w = getWeatherForDayKey(day);
        return `<div class="bg-surface-container-low p-5 sm:p-6 rounded-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 p-3 opacity-10">
                <span class="text-3xl font-black">${dayCodes[day]}</span>
            </div>
            <p class="text-[9px] font-extrabold uppercase tracking-widest text-tertiary mb-3">${t('day.' + day)}</p>
            ${cards.length === 0
                ? `<p class="text-xs text-on-surface-variant opacity-50 italic">—</p>`
                : cards.map(c => {
                    const d = c[currentLang];
                    const rating = ud.ratings[c.id] || 0;
                    return `<div class="flex items-center gap-3 mb-2 last:mb-0">
                        <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-extrabold text-on-primary flex-shrink-0" style="background:${c.color};">${c.id}</div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-bold text-on-surface truncate">${d.name}</p>
                            <p class="text-[10px] text-on-surface-variant">${d.dist} · ${d.loc}</p>
                        </div>
                        ${rating === 1 ? `<span class="material-symbols-outlined text-sm text-primary flex-shrink-0" style="font-variation-settings: 'FILL' 1;">thumb_up</span>` : rating === -1 ? `<span class="material-symbols-outlined text-sm text-tertiary flex-shrink-0" style="font-variation-settings: 'FILL' 1;">thumb_down</span>` : ''}
                    </div>`;
                }).join('')}
            ${w ? `<div class="flex items-center gap-1.5 mt-3 pt-3 border-t border-outline-variant/15">
                <span class="material-symbols-outlined text-base ${w.code<=2?'text-tertiary':w.code>=61?'text-primary':'text-on-surface-variant'}">${w.icon}</span>
                <span class="text-xs font-bold text-on-surface">${w.hi}°/${w.lo}°</span>
                <span class="text-[10px] text-on-surface-variant">${currentLang === 'cs' ? w.csLabel : w.enLabel}</span>
                ${w.rain > 0 ? `<span class="text-[10px] text-on-surface-variant">· 💧${w.rain}mm</span>` : ''}
            </div>` : ''}
        </div>`;
    }).join('');

    document.getElementById('planner-days').innerHTML = html;
    document.getElementById('planner-days').className = 'grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 sm:gap-5';
}

                <span class="text-sm font-extrabold text-on-surface uppercase tracking-wide">${t('tips.' + catKey)}</span>
                <span class="material-symbols-outlined text-sm text-on-surface-variant chev transition-transform">expand_more</span>
            </button>
            <div class="space-y-2">
                ${cat.tips.map(tp => {
                    const d = tp[currentLang];
                    return `<div class="bg-surface-container-lowest rounded-xl p-4 flex gap-3 border-l-[3px] ${borderColor}">
                        <span class="material-symbols-outlined text-lg text-${catColors[catKey]} flex-shrink-0 mt-0.5">${tp.icon}</span>
                        <div>
                            <p class="text-sm font-bold text-on-surface mb-0.5">${d.title}</p>
                            <p class="text-xs text-on-surface-variant leading-relaxed">${d.text}</p>
                        </div>
                    </div>`;
                }).join('')}
            </div>
        </div>`;
    }

    html += `<div class="flex justify-center items-center gap-1 mt-8 pt-4 border-t border-outline-variant/15">
        <span class="material-symbols-outlined text-xs text-outline-variant">translate</span>
        <button onclick="setLang('cs')" id="lang-cs" class="text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded ${currentLang === 'cs' ? 'text-primary' : 'text-outline-variant'}">Čeština</button>
        <span class="text-[10px] text-outline-variant">·</span>
        <button onclick="setLang('en')" id="lang-en" class="text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded ${currentLang === 'en' ? 'text-primary' : 'text-outline-variant'}">English</button>
    </div>`;

    document.getElementById('tips-root').innerHTML = html;
}

function applyI18n() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t(el.dataset.i18n);
    });
}

function renderAll() {
    applyI18n();
    renderFilters();
    renderCards();
    renderPlanner();
    renderTips();
}

function setLang(lang) {
    currentLang = lang;
    document.documentElement.lang = lang;
    renderAll();
}

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
function switchSection(name) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('section-' + name).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => { n.classList.remove('active'); n.classList.add('text-stone-500'); });
    const active = document.querySelector(`.nav-item[data-section="${name}"]`);
    active.classList.add('active'); active.classList.remove('text-stone-500');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    if (name === 'map') setTimeout(() => map.invalidateSize(), 100);
}

// ═══════════════════════════════════════════════════
// MAP
// ═══════════════════════════════════════════════════
const map = L.map('leaflet-map', { zoomControl: false }).setView([50.7600, 15.2400], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);

function makeIcon(html) { return L.divIcon({ html, className: '', iconSize: [32, 32], iconAnchor: [16, 16] }); }

L.marker([50.7167, 15.3167], {
    icon: makeIcon('<div style="background:#384b38;color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);">🏠</div>')
}).addTo(map).bindPopup('<strong>Velké Hamry</strong>');

const markers = {};
CARDS.forEach(c => {
    const icon = makeIcon(`<div style="background:${c.color};color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:${c.id > 9 ? '11' : '14'}px;font-weight:800;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);font-family:'Plus Jakarta Sans',sans-serif;">${c.id}</div>`);
    const marker = L.marker([c.lat, c.lng], { icon }).addTo(map)
        .bindPopup(`<strong>${c.cs.name}</strong>`)
        .on('click', () => {
            const card = document.getElementById('card-' + c.id);
            if (card) { card.scrollIntoView({ behavior: 'smooth', block: 'center' }); card.classList.add('highlighted'); setTimeout(() => card.classList.remove('highlighted'), 2000); }
        });
    markers[c.id] = marker;
});

// ═══════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════
const activeFilters = new Set();

function toggleFilter(el) {
    const filter = el.dataset.filter;
    if (activeFilters.has(filter)) {
        activeFilters.delete(filter);
        el.classList.remove('bg-tertiary', 'text-on-tertiary');
        el.classList.add('bg-surface-container-high', 'text-on-surface-variant');
    } else {
        activeFilters.add(filter);
        el.classList.add('bg-tertiary', 'text-on-tertiary');
        el.classList.remove('bg-surface-container-high', 'text-on-surface-variant');
    }
    applyFilters();
}

function applyFilters() {
    const cards = document.querySelectorAll('.trail-card');
    if (activeFilters.size === 0) {
        cards.forEach(c => c.classList.remove('hidden-by-filter'));
        CARDS.forEach(c => { if (markers[c.id] && !map.hasLayer(markers[c.id])) markers[c.id].addTo(map); });
        return;
    }
    cards.forEach(card => {
        const good = (card.dataset.good || '').split(',');
        const bad = (card.dataset.bad || '').split(',');
        const stroller = card.dataset.stroller;
        let score = 0, penalty = false;
        activeFilters.forEach(f => {
            if (f === 'stroller') { if (stroller === 'yes') score += 2; else if (stroller === 'partial') score += 1; else penalty = true; }
            else if (good.includes(f)) score += 2;
            else if (bad.includes(f)) penalty = true;
        });
        const shouldHide = penalty && score === 0;
        card.classList.toggle('hidden-by-filter', shouldHide);
        // Sync map marker
        const id = parseInt(card.id.replace('card-', ''));
        if (markers[id]) {
            if (shouldHide) map.removeLayer(markers[id]);
            else if (!map.hasLayer(markers[id])) markers[id].addTo(map);
        }
    });
}

// ═══════════════════════════════════════════════════
// CAROUSEL
// ═══════════════════════════════════════════════════
const carouselState = {};

function slideCarousel(cardId, dir) {
    const card = CARDS.find(c => c.id === cardId);
    if (!card || !card.photos) return;
    const max = card.photos.length - 1;
    if (!carouselState[cardId]) carouselState[cardId] = 0;
    carouselState[cardId] = Math.max(0, Math.min(max, carouselState[cardId] + dir));
    updateCarousel(cardId);
}

function updateCarousel(cardId) {
    const el = document.getElementById('carousel-' + cardId);
    if (!el) return;
    const idx = carouselState[cardId] || 0;
    const card = CARDS.find(c => c.id === cardId);
    const pct = (100 / card.photos.length) * idx;
    el.style.transform = `translateX(-${pct}%)`;
    // Update dots
    document.querySelectorAll(`.carousel-dot[data-carousel="${cardId}"]`).forEach(dot => {
        dot.className = dot.className.replace(/bg-surface\/50|bg-surface(?!\/)/g, '');
        dot.classList.add(parseInt(dot.dataset.idx) === idx ? 'bg-surface' : 'bg-surface/50');
    });
}

// Touch swipe support for carousels
document.addEventListener('touchstart', e => {
    const carousel = e.target.closest('.carousel');
    if (!carousel) return;
    carousel._touchX = e.touches[0].clientX;
}, { passive: true });

document.addEventListener('touchend', e => {
    const carousel = e.target.closest('.carousel');
    if (!carousel || !carousel._touchX) return;
    const diff = carousel._touchX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) {
        const id = parseInt(carousel.id.replace('carousel-', ''));
        slideCarousel(id, diff > 0 ? 1 : -1);
    }
    carousel._touchX = null;
}, { passive: true });

// ═══════════════════════════════════════════════════
// WEATHER
// ═══════════════════════════════════════════════════
const WMO = { 0:['wb_sunny','Jasno','Clear'],1:['wb_sunny','Skoro jasno','Mostly clear'],2:['cloud','Polojasno','Partly cloudy'],3:['cloud','Zataženo','Overcast'],45:['foggy','Mlha','Fog'],48:['foggy','Námraza','Rime fog'],51:['grain','Mrholení','Drizzle'],53:['grain','Mrholení','Drizzle'],55:['grain','Mrholení','Heavy drizzle'],61:['rainy','Slabý déšť','Light rain'],63:['rainy','Déšť','Rain'],65:['rainy','Silný déšť','Heavy rain'],71:['ac_unit','Sníh','Snow'],73:['ac_unit','Sníh','Snow'],75:['ac_unit','Husté sněžení','Heavy snow'],80:['rainy','Přeháňky','Showers'],81:['rainy','Silné přeháňky','Heavy showers'],82:['thunderstorm','Lijáky','Violent showers'],95:['thunderstorm','Bouřka','Thunderstorm'],96:['thunderstorm','Bouřka','T-storm + hail'],99:['thunderstorm','Silná bouřka','Heavy T-storm'] };
let weatherByDate = {}; // keyed by YYYY-MM-DD

async function loadWeather() {
    try {
        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=50.72&longitude=15.32&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,weathercode&timezone=Europe/Prague&forecast_days=7');
        const data = await res.json();
        const days = data.daily;
        for (let i = 0; i < days.time.length; i++) {
            const code = days.weathercode[i];
            const [icon, csLabel, enLabel] = WMO[code] || ['help','?','?'];
            weatherByDate[days.time[i]] = {
                icon, csLabel, enLabel,
                hi: Math.round(days.temperature_2m_max[i]),
                lo: Math.round(days.temperature_2m_min[i]),
                rain: days.precipitation_sum[i],
                wind: Math.round(days.windspeed_10m_max[i]),
                code
            };
        }
        renderPlanner(); // re-render with weather data
    } catch (e) { /* weather will just not show */ }
}

function getWeatherForDayKey(dayKey) {
    // Map day keys to upcoming dates
    const now = new Date();
    const dayMap = { 'mon': 1, 'tue': 2, 'wed': 3, 'thu': 4, 'fri': 5, 'sat': 6, 'sun': 0 };
    const target = dayMap[dayKey];
    if (target === undefined) return null;
    for (let i = 0; i < 7; i++) {
        const d = new Date(now); d.setDate(now.getDate() + i);
        if (d.getDay() === target) {
            const key = d.toISOString().split('T')[0];
            return weatherByDate[key] || null;
        }
    }
    return null;
}

function renderWeatherBadge(w) {
    if (!w) return '';
    const label = currentLang === 'cs' ? w.csLabel : w.enLabel;
    return `<div class="flex items-center gap-2 px-3 py-2 bg-surface-container-lowest rounded-xl">
        <span class="material-symbols-outlined text-xl ${w.code<=2?'text-tertiary':w.code>=61?'text-primary':'text-on-surface-variant'}">${w.icon}</span>
        <div class="text-left">
            <p class="text-xs font-bold text-on-surface">${w.hi}°/${w.lo}°</p>
            <p class="text-[10px] text-on-surface-variant">${label}${w.rain > 0 ? ` · 💧${w.rain}mm` : ''}${w.wind > 30 ? ` · 💨${w.wind}km/h` : ''}</p>
        </div>
    </div>`;
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
renderAll();
loadWeather();
</script>
