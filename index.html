function t(key) { return T[currentLang][key] || T['en'][key] || key; }

function renderFilters() {
    document.getElementById('filter-bar').innerHTML = FILTERS.map(f =>
        `<button onclick="toggleFilter(this)" data-filter="${f.key}" class="filter-pill bg-surface-container-high text-on-surface-variant px-4 py-2 rounded-full flex items-center gap-1.5 text-xs sm:text-sm font-bold hover:bg-surface-container-highest transition-all active:scale-95">
            <span class="material-symbols-outlined text-[18px]">${f.icon}</span> ${t('filter.' + f.key)}
        </button>`
    ).join('');
}

    const imgSection = hasImg

            <div class="absolute top-3 left-3 flex gap-1.5">
                ${d.badges.map((b,i) => `<span class="${i===0 && c.id===1 ? 'bg-tertiary text-on-tertiary' : 'bg-surface-container-lowest/90 backdrop-blur text-primary'} text-[9px] sm:text-[10px] font-bold uppercase tracking-widest px-2.5 py-1 rounded-full">${b}</span>`).join('')}

        : `<div class="relative h-44 sm:h-56 overflow-hidden flex items-center justify-center" style="background: linear-gradient(135deg, ${c.color}18 0%, ${c.color}08 50%, #f6f3eb 100%);">

                ${d.badges.map(b => `<span class="bg-surface-container-lowest/90 backdrop-blur text-primary text-[9px] sm:text-[10px] font-bold uppercase tracking-widest px-2.5 py-1 rounded-full">${b}</span>`).join('')}
            </div>
        </div>`;
    const isTime = d.dist.includes('h') || d.dist.includes('min');
    return `<div class="trail-card group bg-surface-container-lowest rounded-2xl sm:rounded-3xl overflow-hidden shadow-[0px_12px_32px_rgba(28,28,23,0.06)] border border-outline-variant/10 flex flex-col"

                <h3 class="text-lg sm:text-xl font-extrabold text-on-surface leading-tight">${d.name}</h3>
                <div class="flex items-center text-primary font-bold text-xs whitespace-nowrap ml-2">
                    <span class="material-symbols-outlined mr-0.5 text-sm">${isTime ? 'schedule' : 'directions_walk'}</span>${d.dist}
                </div>
            </div>
            <div class="flex flex-wrap gap-1.5 mb-4">
                <span class="bg-surface-container text-on-surface-variant text-[10px] font-medium px-2.5 py-0.5 rounded-full">${d.loc}</span>
                <span class="bg-primary-fixed text-on-primary-fixed-variant text-[10px] font-medium px-2.5 py-0.5 rounded-full">${d.strollerLabel}</span>
                ${d.weatherTags.map(wt => `<span class="${wt.includes('❌') || wt.includes('Ne ') ? 'bg-tertiary-fixed text-on-tertiary-fixed-variant' : 'bg-primary-fixed text-on-primary-fixed-variant'} text-[10px] font-medium px-2.5 py-0.5 rounded-full">${wt}</span>`).join('')}
            </div>
            <p class="text-xs sm:text-sm text-on-surface-variant leading-relaxed mb-4">${d.desc}</p>
            <div class="bg-surface-container-low p-4 rounded-xl mb-4 flex-1">
                <p class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-1">${t('kids')}</p>
                <p class="text-xs sm:text-sm leading-relaxed text-on-surface-variant">${d.kids}</p>
            </div>
            ${d.details ? `<button onclick="toggleDetails(${c.id})" id="toggle-${c.id}" class="detail-toggle w-full flex items-center justify-center gap-1.5 py-2.5 mb-3 text-xs font-bold text-primary hover:text-primary-container transition-colors active:scale-[0.98]">
                <span class="label">${t('btn.more')}</span>
                <span class="material-symbols-outlined text-sm chevron">expand_more</span>
            </button>
            <div id="details-${c.id}" class="detail-section mb-4">
                <div class="bg-surface-container-low rounded-xl p-4 space-y-3">
                    ${renderDetailRow('schedule', t('detail.hours'), d.details.hours)}
                    ${renderDetailRow('local_parking', t('detail.parking'), d.details.parking)}
                    ${renderDetailRow('payments', t('detail.fee'), d.details.fee)}
                    ${renderDetailRow('timer', t('detail.time'), d.details.time)}
                    ${renderDetailRow('restaurant', t('detail.food'), d.details.food)}
                    ${renderDetailRow('warning', t('detail.warnings'), d.details.warnings)}
                    ${renderDetailRow('wb_sunny', t('detail.bestTime'), d.details.bestTime)}
                    ${d.details.web ? `<div class="flex items-start gap-2.5">
                        <span class="material-symbols-outlined text-sm text-primary mt-0.5">language</span>
                        <div><p class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-0.5">${t('detail.web')}</p>
                        <a href="https://${d.details.web}" target="_blank" class="text-xs text-primary underline underline-offset-2 hover:text-primary-container">${d.details.web}</a></div>
                    </div>` : ''}
                </div>
            </div>` : ''}
            <a class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:opacity-90 transition-opacity active:scale-[0.98]" href="${c.link}" target="_blank">
                <span class="material-symbols-outlined text-sm">map</span> ${c.isSearch ? t('btn.search') : t('btn.mapy')}
            </a>
        </div>
    </div>`;
}

function renderDetailRow(icon, label, value) {
    if (!value) return '';
    return `<div class="flex items-start gap-2.5">
        <span class="material-symbols-outlined text-sm text-primary mt-0.5">${icon}</span>
        <div><p class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-0.5">${label}</p>
        <p class="text-xs leading-relaxed text-on-surface">${value}</p></div>
    </div>`;
}

function toggleDetails(id) {
    const section = document.getElementById('details-' + id);
    const btn = document.getElementById('toggle-' + id);
    const isOpen = section.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
    btn.querySelector('.label').textContent = isOpen ? t('btn.less') : t('btn.more');
}

function renderCards() {
    const cats = { recommended: [], indoor: [], daytrips: [] };
    CARDS.forEach(c => cats[c.category].push(c));
    let html = '';
    for (const [cat, cards] of Object.entries(cats)) {
        html += `<h2 class="text-xl sm:text-2xl font-extrabold text-primary ${cat !== 'recommended' ? 'mt-8' : ''} mb-4 sm:mb-6 flex items-center gap-3">
            ${t('cat.' + cat)}<span class="h-px flex-1 bg-outline-variant/20"></span></h2>`;
        html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-5 sm:gap-6">${cards.map(renderCard).join('')}</div>`;
    }
    document.getElementById('cards-root').innerHTML = html;
}

function renderPlanner() {
    const days = [
        { key: 'fri', code: 'FRI', dots: 1 },
        { key: 'sat', code: 'SAT', dots: 2 },
        { key: 'sun', code: 'SUN', dots: 3 }
    ];
    document.getElementById('planner-days').innerHTML = days.map(d => `
        <div class="bg-surface-container-low p-5 sm:p-6 rounded-2xl relative overflow-hidden group ${d.key === 'sun' ? 'border-2 border-primary/10' : ''}">
            <div class="absolute top-0 right-0 p-3 opacity-10 group-hover:opacity-20 transition-opacity">
                <span class="text-3xl font-black">${d.code}</span>
            </div>
            <p class="text-[9px] font-extrabold uppercase tracking-widest text-tertiary mb-1">${t('day.' + d.key)} — ${t('day.' + d.key + '.label')}</p>
            <h4 class="text-lg font-extrabold text-on-surface mb-3">${t('day.' + d.key + '.name')}</h4>
            <p class="text-xs sm:text-sm text-on-surface-variant leading-relaxed">${t('day.' + d.key + '.desc')}</p>
            <div class="mt-4 flex gap-1">
                ${[1,2,3].map(i => `<span class="w-1.5 h-1.5 rounded-full ${i <= d.dots ? 'bg-primary' : 'bg-outline-variant/30'}"></span>`).join('')}
            </div>
        </div>
    `).join('');
}

function renderTips() {
    const tips = [
        { icon: 'map', title: t('tip1.title'), text: t('tip1.text') },
        { icon: 'restaurant', title: t('tip2.title'), text: t('tip2.text') },
        { icon: 'backpack', title: t('tip3.title'), text: t('tip3.text') },
        { icon: 'settings_backup_restore', title: t('tip4.title'), text: t('tip4.text') }
    ];
    document.getElementById('tips-root').innerHTML = `
        <div class="bg-primary text-on-primary p-6 sm:p-8 rounded-2xl sm:rounded-3xl relative overflow-hidden">
            <span class="material-symbols-outlined absolute -right-4 -bottom-4 text-8xl opacity-10">hiking</span>
            <h3 class="text-xl sm:text-2xl font-extrabold mb-2">${t('tips.title')}</h3>
            <p class="text-sm opacity-80 mb-5">${t('tips.subtitle')}</p>
            <div class="grid grid-cols-2 gap-3">
                ${tips.map(tp => `<div class="bg-primary-container/30 p-4 rounded-xl flex flex-col gap-2">
                    <span class="material-symbols-outlined text-primary-fixed">${tp.icon}</span>
                    <p class="text-[10px] font-bold uppercase tracking-wider">${tp.title}</p>
                    <p class="text-xs opacity-80 leading-relaxed">${tp.text}</p>
                </div>`).join('')}
            </div>
        </div>`;

function applyI18n() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t(el.dataset.i18n);
    });
}

function renderAll() {
    applyI18n();
    renderFilters();
    renderCards();
    renderPlanner();
    renderTips();
}

function setLang(lang) {
    currentLang = lang;
    document.getElementById('lang-cs').className = `text-[9px] font-bold uppercase tracking-widest px-2 py-0.5 ${lang === 'cs' ? 'text-primary' : 'text-outline-variant'}`;
    document.getElementById('lang-en').className = `text-[9px] font-bold uppercase tracking-widest px-2 py-0.5 ${lang === 'en' ? 'text-primary' : 'text-outline-variant'}`;
    document.documentElement.lang = lang;
    renderAll();
}

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
function switchSection(name) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('section-' + name).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => { n.classList.remove('active'); n.classList.add('text-stone-500'); });
    const active = document.querySelector(`.nav-item[data-section="${name}"]`);
    active.classList.add('active'); active.classList.remove('text-stone-500');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    if (name === 'map') setTimeout(() => map.invalidateSize(), 100);
}

// ═══════════════════════════════════════════════════
// MAP
// ═══════════════════════════════════════════════════
const map = L.map('leaflet-map', { zoomControl: false }).setView([50.7600, 15.2400], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);

function makeIcon(html) { return L.divIcon({ html, className: '', iconSize: [32, 32], iconAnchor: [16, 16] }); }

L.marker([50.7167, 15.3167], {
    icon: makeIcon('<div style="background:#384b38;color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);">🏠</div>')
}).addTo(map).bindPopup('<strong>Velké Hamry</strong>');

CARDS.forEach(c => {
    const icon = makeIcon(`<div style="background:${c.color};color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:${c.id > 9 ? '11' : '14'}px;font-weight:800;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);font-family:'Plus Jakarta Sans',sans-serif;">${c.id}</div>`);
    L.marker([c.lat, c.lng], { icon }).addTo(map)
        .bindPopup(`<strong>${c.cs.name}</strong>`)
        .on('click', () => {
            const card = document.getElementById('card-' + c.id);
            if (card) { card.scrollIntoView({ behavior: 'smooth', block: 'center' }); card.classList.add('highlighted'); setTimeout(() => card.classList.remove('highlighted'), 2000); }
        });
});

// ═══════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════
const activeFilters = new Set();

function toggleFilter(el) {
    const filter = el.dataset.filter;
    if (activeFilters.has(filter)) {
        activeFilters.delete(filter);
        el.classList.remove('bg-tertiary', 'text-on-tertiary');
        el.classList.add('bg-surface-container-high', 'text-on-surface-variant');
    } else {
        activeFilters.add(filter);
        el.classList.add('bg-tertiary', 'text-on-tertiary');
        el.classList.remove('bg-surface-container-high', 'text-on-surface-variant');
    }
    applyFilters();
}

function applyFilters() {
    const cards = document.querySelectorAll('.trail-card');
    if (activeFilters.size === 0) { cards.forEach(c => c.classList.remove('dimmed')); return; }
    cards.forEach(card => {
        const good = (card.dataset.good || '').split(',');
        const bad = (card.dataset.bad || '').split(',');
        const stroller = card.dataset.stroller;
        let score = 0, penalty = false;
        activeFilters.forEach(f => {
            if (f === 'stroller') { if (stroller === 'yes') score += 2; else if (stroller === 'partial') score += 1; else penalty = true; }
            else if (good.includes(f)) score += 2;
            else if (bad.includes(f)) penalty = true;
        });
        card.classList.toggle('dimmed', penalty && score === 0);
    });
}

// ═══════════════════════════════════════════════════
// WEATHER
// ═══════════════════════════════════════════════════
async function loadWeather() {
    try {
        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=50.72&longitude=15.32&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,weathercode&timezone=Europe/Prague&forecast_days=7');
        const data = await res.json();
        const container = document.getElementById('weather-container');
        const days = data.daily;
        const dayNames = currentLang === 'cs' ? ['Ne','Po','Út','St','Čt','Pá','So'] : ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        const wmo = { 0:['wb_sunny','Jasno','Clear'],1:['wb_sunny','Skoro jasno','Mostly clear'],2:['cloud','Polojasno','Partly cloudy'],3:['cloud','Zataženo','Overcast'],45:['foggy','Mlha','Fog'],48:['foggy','Námraza','Rime fog'],51:['grain','Mrholení','Drizzle'],53:['grain','Mrholení','Drizzle'],55:['grain','Mrholení','Heavy drizzle'],61:['rainy','Slabý déšť','Light rain'],63:['rainy','Déšť','Rain'],65:['rainy','Silný déšť','Heavy rain'],71:['ac_unit','Sníh','Snow'],73:['ac_unit','Sníh','Snow'],75:['ac_unit','Husté sněžení','Heavy snow'],80:['rainy','Přeháňky','Showers'],81:['rainy','Silné přeháňky','Heavy showers'],82:['thunderstorm','Lijáky','Violent showers'],95:['thunderstorm','Bouřka','Thunderstorm'],96:['thunderstorm','Bouřka','T-storm + hail'],99:['thunderstorm','Silná bouřka','Heavy T-storm'] };
        let html = '';
        for (let i = 0; i < Math.min(7, days.time.length); i++) {
            const d = new Date(days.time[i]);
            const dn = dayNames[d.getDay()];
            const ds = `${d.getDate()}.${d.getMonth()+1}.`;
            const code = days.weathercode[i];
            const [icon, csLabel, enLabel] = wmo[code] || ['help','?','?'];
            const label = currentLang === 'cs' ? csLabel : enLabel;
            const hi = Math.round(days.temperature_2m_max[i]), lo = Math.round(days.temperature_2m_min[i]);
            const rain = days.precipitation_sum[i], wind = Math.round(days.windspeed_10m_max[i]);
            const isWe = d.getDay() === 0 || d.getDay() === 6;
            html += `<div class="bg-surface-container-lowest rounded-2xl p-4 text-center ${isWe ? 'border-2 border-primary/20' : ''}">
                <p class="text-[10px] font-bold uppercase tracking-widest ${isWe ? 'text-tertiary' : 'text-on-surface-variant'}">${dn}</p>
                <p class="text-[10px] text-on-surface-variant">${ds}</p>
                <span class="material-symbols-outlined text-2xl sm:text-3xl mt-2 mb-1 ${code<=2?'text-tertiary':code>=61?'text-primary':'text-on-surface-variant'}">${icon}</span>
                <p class="text-xs text-on-surface-variant mb-2">${label}</p>
                <p class="text-lg font-extrabold text-on-surface">${hi}°</p>
                <p class="text-xs text-on-surface-variant">${lo}°</p>
                <div class="mt-2 flex flex-col gap-0.5 text-[10px] text-on-surface-variant">
                    ${rain > 0 ? `<span>💧 ${rain} mm</span>` : ''}
                    ${wind > 30 ? `<span>💨 ${wind} km/h</span>` : ''}
                </div>
            </div>`;
        }
        container.innerHTML = html;
        container.className = 'grid grid-cols-3 sm:grid-cols-4 md:grid-cols-7 gap-3';
    } catch (e) {
        document.getElementById('weather-container').innerHTML = `<p class="text-sm text-on-surface-variant">${currentLang === 'cs' ? 'Nepodařilo se načíst předpověď.' : 'Could not load forecast.'}</p>`;
    }
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
renderAll();
loadWeather();
</script>
